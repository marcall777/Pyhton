<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Calculadora Flask</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

    <h1>Calculadora Web com Flask</h1>

    <div id="calculator">
        <form method="POST" action="{{ url_for('index') }}">

            <div class="form-grupo">
                <label>Primeiro número</label>
                <input type="number" name="num1" step="any" required
                    value="{{ request.form.get('num1', '') }}">
            </div>

            <div class="form-grupo">
                <label>Operação</label>

                {% set op = request.form.get('operacao', '+') %}

                <select id="operacao" name="operacao" onchange="atualizarNum2()">
                    <option value="+">Somar (+)</option>
                    <option value="-">Subtrair (-)</option>
                    <option value="*">Multiplicar (×)</option>
                    <option value="/">Dividir (÷)</option>
                    <option value="**">Potência (^)</option>
                    <option value="sqrt">Raiz Quadrada (√)</option>
                    <option value="log">Logaritmo (log)</option>
                </select>
            </div>

            <div class="form-grupo" id="grupo-num2">
                <label>Segundo número</label>
                <input type="number" id="num2" name="num2" step="any"
                    value="{{ request.form.get('num2', '') }}">
            </div>

            <button type="submit">Calcular</button>

        </form>

        {% if etapas %}
        <div class="resultado">
            <strong>Resposta do servidor:</strong>
            <div>{{ etapas }}</div>
            <div>Resultado: {{ resultados }}</div>
        </div>
        {% endif %}

        <a href="{{ url_for('index') }}">Limpar / Nova conta</a>
    </div>

    <script>
        function atualizarNum2() {
            const operacao = document.getElementById("operacao").value;
            const ocultar = operacao === "sqrt" || operacao === "log";

            const grupo = document.getElementById("grupo-num2");
            const num2 = document.getElementById("num2");

            grupo.style.display = ocultar ? "none" : "block";
            num2.required = !ocultar;

            if (ocultar) {
                num2.value = "";
            }
        }

        atualizarNum2();
    </script>

</body>
</html>
